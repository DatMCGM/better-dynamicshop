<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DynamicShop Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
<style>
:root {
  --bg0: #080b10;
  --bg1: #0f1318;
  --bg2: #141920;
  --bg3: #1a2028;
  --line: #1e2631;
  --line2: #141920;
  --hi: #e8edf5;
  --mid: #8b95a7;
  --low: #4a5568;
  --up: #3ddc84;
  --up-bg: rgba(61,220,132,0.1);
  --dn: #f0614e;
  --dn-bg: rgba(240,97,78,0.1);
  --gold: #f0b94d;
  --blue: #5ec8e0;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg0);
  color: var(--hi);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Ticker ───────────────────────── */
.ticker {
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  height: 34px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.ticker-track {
  display: inline-flex;
  gap: 36px;
  animation: ticker-scroll 50s linear infinite; /* 50s là fallback, JS sẽ ghi đè animation-duration theo độ dài nội dung */
  padding-left: 100%;
  white-space: nowrap;
}
@keyframes ticker-scroll { to { transform: translateX(-100%); } }
.tick { display: inline-flex; gap: 8px; align-items: center; font-size: 11.5px; }
.tick-sym { color: var(--mid); font-weight: 600; }
.tick-val { color: var(--hi); }
.tick-chg.up { color: var(--up); }
.tick-chg.dn { color: var(--dn); }
.tick-chg.flat { color: var(--low); }

/* ── Header ───────────────────────── */
header {
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold), #c98f20);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 15px; color: #1a1408;
  font-family: var(--sans);
  border-radius: 3px;
  transform: rotate(-4deg);
}
.logo h1 { font-family: var(--sans); font-size: 17px; font-weight: 700; }
.logo-sub { color: var(--low); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }

.server-switcher { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.server-switcher label { color: var(--low); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
.server-select {
  background: var(--bg2); border: 1px solid var(--line);
  color: var(--hi); padding: 6px 10px;
  font-family: var(--mono); font-size: 12px; cursor: pointer;
  min-width: 200px;
}
.server-select:focus { outline: none; border-color: var(--gold); }

.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--low); }
.conn-dot.live { background: var(--up); box-shadow: 0 0 8px var(--up); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.conn-label { font-size: 11px; color: var(--mid); }

/* ── Body layout ──────────────────── */
.body-wrap {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Left sidebar — item list ─────── */
.sidebar {
  width: 260px;
  border-right: 1px solid var(--line);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--bg1);
}
.sidebar-head {
  padding: 14px 16px 10px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--low);
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
}
.item-row {
  padding: 11px 16px;
  border-bottom: 1px solid var(--line2);
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.item-row:hover { background: var(--bg2); }
.item-row.active { background: var(--bg3); box-shadow: inset 2px 0 0 var(--gold); }
.item-row .iname { font-size: 12.5px; font-weight: 600; }
.item-row .imat { font-size: 10px; color: var(--low); margin-top: 1px; }
.item-row .iprice { font-size: 13px; font-weight: 700; font-family: var(--sans); text-align: right; }
.item-row .ichg { font-size: 10px; font-weight: 600; margin-top: 2px; text-align: right; }
.up { color: var(--up); } .dn { color: var(--dn); } .flat { color: var(--low); }

/* ── Main area ────────────────────── */
.main-area {
  flex: 1;
  overflow-y: auto;
  background: var(--bg0);
}

/* ── Chart panel ──────────────────── */
.chart-card {
  margin: 20px 24px 0;
  border: 1px solid var(--line);
  background: var(--bg1);
}
.chart-top {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.chart-title { display: flex; align-items: baseline; gap: 12px; }
.chart-name { font-family: var(--sans); font-size: 18px; font-weight: 700; }
.chart-price { font-family: var(--sans); font-size: 22px; font-weight: 700; }
.chart-badge {
  font-size: 12px; font-weight: 700;
  padding: 3px 8px; border-radius: 3px;
}
.chart-badge.up { color: var(--up); background: var(--up-bg); }
.chart-badge.dn { color: var(--dn); background: var(--dn-bg); }
.chart-badge.flat { color: var(--low); background: var(--bg3); }

.range-btns { display: flex; gap: 3px; background: var(--bg0); padding: 3px; border-radius: 4px; }
.range-btns button {
  background: transparent; border: none;
  color: var(--low); font-family: var(--mono); font-size: 11.5px;
  padding: 5px 10px; border-radius: 3px; cursor: pointer;
  transition: all 0.15s;
}
.range-btns button:hover { color: var(--hi); }
.range-btns button.active { background: var(--bg3); color: var(--hi); }

.chart-body { height: 300px; padding: 16px 20px 20px; position: relative; }

.stat-row {
  display: flex;
  border-top: 1px solid var(--line);
}
.stat-cell {
  flex: 1;
  padding: 12px 20px;
  border-right: 1px solid var(--line);
}
.stat-cell:last-child { border-right: none; }
.stat-cell .slabel { font-size: 10px; color: var(--low); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.stat-cell .sval { font-size: 14px; font-weight: 700; }

/* ── Bottom panels ────────────────── */
.bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  margin: 20px 24px 24px;
  border: 1px solid var(--line);
}
.mini-card { background: var(--bg1); }
.mini-head {
  padding: 12px 16px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--low);
  border-bottom: 1px solid var(--line);
}
.mover-row {
  padding: 9px 16px;
  border-bottom: 1px solid var(--line2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}
.mover-row .mrank { color: var(--low); width: 20px; }
.mover-row .mname { flex: 1; font-weight: 500; }
.tx-row {
  padding: 9px 16px;
  border-bottom: 1px solid var(--line2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11.5px;
}
.tx-badge {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 6px; border-radius: 2px;
}
.tx-badge.buy { color: var(--dn); background: var(--dn-bg); }
.tx-badge.sell { color: var(--up); background: var(--up-bg); }
.tx-meta { color: var(--mid); flex: 1; text-align: center; }
.tx-time { color: var(--low); font-size: 10.5px; }

/* ── Empty / loading ──────────────── */
.empty { padding: 28px 16px; text-align: center; color: var(--low); font-size: 11.5px; line-height: 1.8; }

/* ── Admin FAB ────────────────────── */
.fab {
  position: fixed; bottom: 20px; right: 20px;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--bg2); border: 1px solid var(--line);
  color: var(--mid); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; transition: all 0.15s;
}
.fab:hover { color: var(--gold); border-color: var(--gold); }

/* ── Modal ────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  display: none; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(3px);
}
.overlay.show { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--line);
  padding: 24px; width: 320px;
}
.modal h3 { font-family: var(--sans); font-size: 15px; margin-bottom: 16px; }
.modal label { display: block; font-size: 10.5px; color: var(--mid); text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 5px; }
.modal input, .modal select {
  width: 100%; background: var(--bg0); border: 1px solid var(--line);
  color: var(--hi); padding: 8px 10px; font-family: var(--mono); font-size: 12.5px;
}
.modal input:focus, .modal select:focus { outline: none; border-color: var(--gold); }
.btn-row { display: flex; gap: 8px; margin-top: 18px; }
.btn { flex: 1; padding: 9px; border: none; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 600; }
.btn-primary { background: var(--gold); color: #1a1408; }
.btn-ghost { background: transparent; color: var(--mid); border: 1px solid var(--line) !important; }
.modal .err { color: var(--dn); font-size: 11px; margin-top: 8px; min-height: 14px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg0); }
::-webkit-scrollbar-thumb { background: var(--line); }
</style>
</head>
<body>

<div class="ticker"><div class="ticker-track" id="tickerTrack"></div></div>

<header>
  <div class="logo">
    <div class="logo-mark">$</div>
    <div>
      <h1>DynamicShop</h1>
      <div class="logo-sub">Market Dashboard</div>
    </div>
  </div>

  <div class="server-switcher">
    <label>Server</label>
    <select class="server-select" id="serverSelect">
      <option value="">— Chọn server —</option>
    </select>
  </div>

  <div style="display:flex;align-items:center;gap:8px">
    <span class="conn-dot" id="connDot"></span>
    <span class="conn-label" id="connLabel">Đang kết nối...</span>
  </div>
</header>

<div class="body-wrap">

  <div class="sidebar">
    <div class="sidebar-head">
      <span>Vật Phẩm</span>
      <span id="itemCount">0</span>
    </div>
    <div id="itemList"><div class="empty">Chọn server để xem</div></div>
  </div>

  <div class="main-area">

    <div class="chart-card">
      <div class="chart-top">
        <div class="chart-title">
          <span class="chart-name" id="cName">—</span>
          <span class="chart-price" id="cPrice">$0.00</span>
          <span class="chart-badge flat" id="cBadge">0.0%</span>
        </div>
        <div class="range-btns" id="rangeBtns">
          <button data-h="1">1G</button>
          <button data-h="6">6G</button>
          <button data-h="24" class="active">24G</button>
          <button data-h="168">7N</button>
        </div>
      </div>
      <div class="chart-body"><canvas id="priceChart"></canvas></div>
      <div class="stat-row">
        <div class="stat-cell"><div class="slabel">Giá Mua</div><div class="sval" id="sBuy">—</div></div>
        <div class="stat-cell"><div class="slabel">Giá Bán</div><div class="sval" id="sSell">—</div></div>
        <div class="stat-cell"><div class="slabel">Tổng Mua</div><div class="sval" id="sBought">—</div></div>
        <div class="stat-cell"><div class="slabel">Tổng Bán</div><div class="sval" id="sSold">—</div></div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="mini-card">
        <div class="mini-head">📈 Biến Động Mạnh Nhất</div>
        <div id="topMovers"><div class="empty">Chưa có dữ liệu</div></div>
      </div>
      <div class="mini-card">
        <div class="mini-head">⚡ Giao Dịch Gần Đây</div>
        <div id="recentTx"><div class="empty">Chưa có giao dịch</div></div>
      </div>
    </div>

  </div>
</div>

<div class="fab" id="adminFab">⚙</div>

<div class="overlay" id="overlay">
  <div class="modal" id="loginModal">
    <h3>Đăng Nhập Admin</h3>
    <label>Mật khẩu</label>
    <input type="password" id="adminPwd" placeholder="••••••••">
    <div class="err" id="loginErr"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="cancelLogin">Hủy</button>
      <button class="btn btn-primary" id="doLogin">Đăng nhập</button>
    </div>
  </div>

  <div class="modal" id="priceModal" style="display:none">
    <h3>Đặt Giá Thủ Công</h3>
    <label>Vật phẩm</label>
    <select id="priceItem"></select>
    <label>Giá mua mới</label>
    <input type="number" id="newBuy" step="0.01">
    <label>Giá bán mới</label>
    <input type="number" id="newSell" step="0.01">
    <div class="err" id="priceErr"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="cancelPrice">Đóng</button>
      <button class="btn btn-primary" id="doSetPrice">Cập Nhật</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
